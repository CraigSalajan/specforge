name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  checks: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG="v$(node -p "require('./package.json').version")"
          echo "Tag: $TAG | package.json: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Git tag $TAG does not match package.json version $PKG. Bump \"version\" in package.json to match the tag (or tag the matching version)."
            exit 1
          fi

      - name: Ensure CHANGELOG has an entry for this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::No CHANGELOG.md section found for $VERSION. Add a '## [$VERSION] - <date>' entry."
            exit 1
          fi

  test:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

      - name: Publish test report
        uses: dorny/test-reporter@v2
        if: ${{ !cancelled() }}
        with:
          name: Unit Test Results
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: true
          use-actions-summary: false

  release:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing (Azure Trusted Signing)
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

  release-notes:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract notes and update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            index($0, "## [" v "]")==1 {f=1; next}
            f && (index($0,"## [")==1 || substr($0,1,1)=="[") {exit}
            f {print}
          ' CHANGELOG.md > notes.md
          echo "----- generated notes.md -----"
          cat notes.md
          gh release edit "$GITHUB_REF_NAME" --notes-file notes.md
